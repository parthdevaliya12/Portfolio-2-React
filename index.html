<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parth Devaliya | Full Stack Developer Portfolio</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Parth Devaliya is an MCA student and Full Stack Developer skilled in React.js, JavaScript, Tailwind CSS, Node.js, and modern web development. Explore projects, skills, and portfolio."
    />
    <meta
      name="keywords"
      content="Parth Devaliya, Full Stack Developer, React Developer, MERN Stack Developer, Portfolio, Web Developer, JavaScript, Tailwind CSS, MCA Student, Frontend Developer"
    />
    <meta name="author" content="Parth Devaliya" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Social Media SEO) -->
    <meta
      property="og:title"
      content="Parth Devaliya | Full Stack Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Portfolio of Parth Devaliya showcasing projects, skills, and experience in Full Stack Web Development."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourwebsite.com/" />
    <meta property="og:image" content="https://yourwebsite.com/preview.png" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Parth Devaliya | Full Stack Developer Portfolio"
    />
    <meta
      name="twitter:description"
      content="Explore projects and skills of Parth Devaliya, Full Stack Developer specializing in modern web technologies."
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://parthdevaliya12.vercel.app" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
